<div class="page-background">
  <div class="login-card">
    
    <header class="login-header">
      <h1 class="page-title">login</h1>
      <div class="logo-container">
        <img src="assets/logo-risco.png" alt="Logo Risco" class="risco-logo">
      </div>
    </header>

    <main class="login-form-container">
      <form class="login-form">
        
        <div class="input-with-icon">
          <span class="material-icons icon">login</span>
          <input type="text" id="matricula" placeholder="Digite sua matrícula">
        </div>

        <div class="password-field-group">
          <div class="input-with-icon">
            <span class="material-icons icon">lock_open</span>
            <input type="password" id="password" placeholder="Digite sua senha">
          </div>
          <div class="forgot-password-container">
            <a href="#" class="forgot-password-link">Esqueceu a senha?</a>
          </div>
        </div>

        <button type="submit" class="btn-primary-login">Entrar</button>

        <div class="divider">
          <span>ou</span>
        </div>

        <button type="button" class="btn-outlook-login">
          <img src="assets/outlook-icon.png" alt="" class="outlook-icon">
          Entrar com outlook
        </button>
      </form>
    </main>

    <footer class="login-footer">
      <p>Ainda não possui uma conta? <a href="#" class="register-link">Cadastre-se</a></p>
    </footer>

  </div>
</div>
